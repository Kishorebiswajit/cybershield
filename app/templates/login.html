<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberShield — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
  <div style="width:380px;">

    <div style="text-align:center;margin-bottom:32px;">
      <div style="font-size:28px;color:var(--green);letter-spacing:6px;font-weight:bold;">
        CYBERSHIELD
      </div>
      <div style="color:var(--blue);font-size:11px;letter-spacing:3px;margin-top:8px;">
        SECURE ACCESS PORTAL
      </div>
    </div>

    <div class="card">
      <div class="card-title">Authentication required</div>

      {% if error %}
      <div style="background:#1a0000;border:1px solid var(--red);border-radius:4px;
                  padding:10px 14px;margin-bottom:16px;color:var(--red);font-size:13px;">
        [!] {{ error }}
      </div>
      {% endif %}

      <form method="POST"
    {% if request.method == "POST" %}
    {% endif %} method="POST" action="/login">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" class="form-control"
                 placeholder="Enter username" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" class="form-control"
                 placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">
          ACCESS SYSTEM
        </button>
      </form>
    </div>

    <div style="text-align:center;margin-top:16px;color:var(--muted);font-size:11px;">
      [ Authorized personnel only ]
    </div>
  </div>
</div>
</body>
</html>
